name: ci

on: [push, pull_request]

jobs:
  moonbit:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
      fail-fast: false
    runs-on: ${{ matrix.os }}
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install MoonBit on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Linux native dependencies
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: moon version
        run: |
          moon version --all

      - name: moon update
        run: |
          moon update

      - name: Setup MSVC
        if: ${{ matrix.os == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Node.js on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build Proton ABI smoke runtime on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          cmake -S native -B native\build -DCMAKE_INSTALL_PREFIX=native\dist
          cmake --build native\build --config Debug
          cmake --install native\build --config Debug
          ctest --test-dir native\build -C Debug --output-on-failure

      - name: Install Proton CLI for pre-build codegen on Unix
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          moon install --path cli --bin target/proton-tools
          chmod +x target/proton-tools/proton_cli

      - name: Install Proton CLI for pre-build codegen on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          moon install --path cli --bin target/proton-tools

      - name: Assemble active Proton runtime on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          moon -C cli run . -- -C .. cef setup
          if (!(Test-Path .proton\runtime.json)) {
            throw "missing .proton\runtime.json"
          }
          $runtime = (Get-Content .proton\runtime.json | ConvertFrom-Json).dist
          if (!(Test-Path "$runtime\bin\proton.dll")) {
            throw "missing active proton.dll"
          }
          node native\scripts\verify_link_config.mjs $runtime
          (Resolve-Path "$runtime\bin").Path | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Format check
        run: |
          moon fmt --check

      - name: Check framework modules
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          moon check --target native --deny-warn
          moon -C cli test codegen --target native

      - name: Check framework modules on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          moon check --target native --deny-warn
          moon -C cli test codegen --target native

      - name: Check extension catalog on Unix
        if: ${{ matrix.os != 'windows-latest' }}
        run: moon -C extensions check --target native

      - name: Test extensions on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
          PATH: ${{ github.workspace }}\lib;${{ env.PATH }}
        run: moon -C extensions test --target native

      - name: Build examples
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          moon -C examples build --target native

      - name: Build examples on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: |
          moon -C examples build --target native

      - name: List Windows example binaries
        if: ${{ matrix.os == 'windows-latest' }}
        run: Get-ChildItem -Path ".\examples\target" -Recurse -Filter "*.exe" | ForEach-Object { "{0} ({1} bytes)" -f $_.FullName, $_.Length }

      - name: Run examples CDP e2e on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
          PROTON_CDP_E2E_TIMEOUT_MS: 60000
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          node .\scripts\e2e_bridge_smoke.mjs 41_app_commands

      - name: List Unix example binaries
        if: ${{ matrix.os != 'windows-latest' }}
        run: find ./examples/target -type f | xargs ls -lh
