name: ci

on: [push, pull_request]

jobs:
  moonbit:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
      fail-fast: false
    runs-on: ${{ matrix.os }}
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install MoonBit on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Linux native dependencies
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: moon version
        run: |
          moon version --all

      - name: moon update
        run: |
          moon update

      - name: Setup MSVC
        if: ${{ matrix.os == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Lepus CLI for pre-build codegen on Unix
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          moon install --path src/cli --bin target/lepus-tools
          cp target/lepus-tools/cli target/lepus-tools/lepus
          chmod +x target/lepus-tools/lepus

      - name: Install Lepus CLI for pre-build codegen on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          moon install --path src/cli --bin target/lepus-tools
          Copy-Item target\lepus-tools\cli.exe target\lepus-tools\lepus.exe -Force

      - name: Format check
        run: |
          moon fmt --check

      - name: Check framework modules
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          moon check --target native --deny-warn
          moon test src/cli/codegen --target native

      - name: Check framework modules on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          moon check --target native --deny-warn
          moon test src/cli/codegen --target native

      - name: Check extension catalog on Unix
        if: ${{ matrix.os != 'windows-latest' }}
        run: moon -C extensions check --target native

      - name: Test extensions on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
          PATH: ${{ github.workspace }}\lib;${{ env.PATH }}
        run: moon -C extensions test --target native

      - name: Build examples
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          moon -C examples build --target native

      - name: Build examples on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
        run: |
          moon -C examples build --target native

      - name: List Windows example binaries
        if: ${{ matrix.os == 'windows-latest' }}
        run: Get-ChildItem -Path ".\examples\target" -Recurse -Filter "*.exe" | ForEach-Object { "{0} ({1} bytes)" -f $_.FullName, $_.Length }

      - name: Setup Node.js for examples e2e
        if: ${{ matrix.os == 'windows-latest' }}
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run examples CDP e2e on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          _CL_: /utf-8
          LEPUS_CDP_E2E_TIMEOUT_MS: 60000
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          node .\scripts\e2e_cdp_smoke.mjs

      - name: List Unix example binaries
        if: ${{ matrix.os != 'windows-latest' }}
        run: find ./examples/target -type f | xargs ls -lh
