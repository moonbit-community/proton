<html>
  <head>
    <meta charset="UTF-8" />
    <title>__MoonBit__ Notification Runtime</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7efe8;
        --panel: rgba(255, 251, 246, 0.92);
        --ink: #211d18;
        --muted: #6a6157;
        --accent: #0f766e;
        --accent-2: #b45309;
        --line: rgba(33, 29, 24, 0.14);
        --field: #ffffff;
        --shadow: rgba(33, 29, 24, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #12161b;
          --panel: rgba(20, 24, 29, 0.92);
          --ink: #edf2f7;
          --muted: #a9b1b9;
          --accent: #34d399;
          --accent-2: #fb923c;
          --line: rgba(237, 242, 247, 0.12);
          --field: #0f1419;
          --shadow: rgba(0, 0, 0, 0.38);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(circle at top right, rgba(15, 118, 110, 0.14), transparent 32%),
          radial-gradient(circle at bottom left, rgba(180, 83, 9, 0.12), transparent 34%),
          var(--bg);
      }

      main {
        width: min(980px, calc(100vw - 36px));
        margin: 24px auto 38px;
        padding: 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2.4rem, 4vw, 4rem);
        line-height: 0.96;
        letter-spacing: -0.04em;
      }

      .lead,
      .status {
        color: var(--muted);
        line-height: 1.65;
      }

      .lead {
        margin: 0 0 22px;
        max-width: 70ch;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.08fr) minmax(280px, 0.92fr);
        gap: 18px;
      }

      .stack {
        display: grid;
        gap: 18px;
      }

      .panel {
        padding: 18px;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: 0 18px 48px var(--shadow);
      }

      .panel h2 {
        margin: 0 0 14px;
        font-size: 1.02rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--accent);
      }

      .field-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      input,
      textarea {
        width: 100%;
        padding: 11px 12px;
        border: 1px solid var(--line);
        background: var(--field);
        color: var(--ink);
        font: inherit;
      }

      textarea {
        min-height: 130px;
        resize: vertical;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: 0;
        padding: 11px 15px;
        color: white;
        background: var(--accent);
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        background: var(--accent-2);
      }

      ol {
        margin: 0;
        padding-left: 20px;
        line-height: 1.6;
        color: var(--muted);
      }

      ol li + li {
        margin-top: 6px;
      }

      code {
        font-family: "Cascadia Code", monospace;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Notification as its own runtime surface.</h1>
      <p class="lead">
        This example isolates <code>notification.show(...)</code> and its
        activity and click event streams on macOS.
      </p>
      <section class="layout">
        <div class="stack">
          <article class="panel">
            <h2>Compose Notification</h2>
            <div class="field-grid">
              <label>
                Title
                <input id="notification-title" value="__MoonBit__ Runtime" />
              </label>
              <label>
                Level
                <input id="notification-level" value="warning" />
              </label>
            </div>
            <label style="margin-top: 12px;">
              Body
              <textarea id="notification-body">This is the standalone notification example.</textarea>
            </label>
            <label style="margin-top: 12px;">
              Click payload
              <input id="notification-payload" value="standalone-example" />
            </label>
            <div class="actions">
              <button id="show-notification">Show Notification</button>
              <button class="secondary" id="clear-log">Clear Log</button>
            </div>
          </article>
        </div>

        <aside class="panel">
          <h2>Runtime Log</h2>
          <p class="status" id="status-line">Waiting for notification activity.</p>
          <ol id="event-log"></ol>
        </aside>
      </section>
    </main>
    <script>
      const statusLine = document.getElementById("status-line");
      const eventLog = document.getElementById("event-log");

      function appendEvent(label, payload) {
        const item = document.createElement("li");
        item.textContent = label + " " + JSON.stringify(payload);
        eventLog.prepend(item);
      }

      window.__MoonBit__.events.on("notification.activity", (payload) => {
        statusLine.textContent = "Notification activity received.";
        appendEvent("notification.activity", payload);
      });

      window.__MoonBit__.events.on("notification.click", (payload) => {
        statusLine.textContent = "Notification click received.";
        appendEvent("notification.click", payload);
      });

      document.getElementById("clear-log").addEventListener("click", () => {
        eventLog.innerHTML = "";
        statusLine.textContent = "Waiting for notification activity.";
      });

      document.getElementById("show-notification").addEventListener("click", async () => {
        const payload = {
          title: document.getElementById("notification-title").value || undefined,
          body: document.getElementById("notification-body").value,
          level: document.getElementById("notification-level").value || undefined,
          payload: document.getElementById("notification-payload").value || undefined,
        };
        try {
          const result = await window.__MoonBit__.notification.show(payload);
          statusLine.textContent = "Notification request completed.";
          appendEvent("notification.show", result);
        } catch (error) {
          statusLine.textContent = "Notification failed: " + String(error);
        }
      });
    </script>
  </body>
</html>
