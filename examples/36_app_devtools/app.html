<html>
  <head>
    <meta charset="UTF-8" />
    <title>__MoonBit__ DevTools Runtime</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f8fafc;
        --panel: #ffffff;
        --ink: #111827;
        --muted: #64748b;
        --accent: #dc2626;
        --accent-2: #334155;
        --line: rgba(17, 24, 39, 0.14);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --panel: #151b23;
          --ink: #f8fafc;
          --muted: #aab4c1;
          --accent: #f87171;
          --accent-2: #475569;
          --line: rgba(248, 250, 252, 0.14);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: var(--bg);
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      main {
        width: min(880px, calc(100vw - 36px));
        margin: 28px auto 40px;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2rem, 4vw, 3.6rem);
        line-height: 1;
      }

      .panel {
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 20px;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 0;
        background: var(--accent);
        color: white;
        padding: 11px 15px;
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        background: var(--accent-2);
      }

      pre,
      code {
        font-family: "Cascadia Code", monospace;
      }

      pre {
        margin: 18px 0 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        color: var(--muted);
        line-height: 1.55;
      }

      .status {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DevTools from JavaScript.</h1>
      <section class="panel">
        <p class="status" id="status">Ready to call <code>devtools.open()</code>.</p>
        <div class="row">
          <button id="open">Open DevTools</button>
          <button class="secondary" id="probe">Probe API</button>
        </div>
        <pre id="result">Waiting for devtools calls.</pre>
      </section>
    </main>
    <script>
      const result = document.getElementById("result");
      const status = document.getElementById("status");
      const api = window.__MoonBit__.devtools;

      function show(label, value) {
        result.textContent = label + "\n" + JSON.stringify(value, null, 2);
      }

      window.__MoonBit__.events.on("devtools.activity", (event) => {
        status.textContent = "DevTools activity received.";
        show("devtools.activity", event);
      });

      document.getElementById("open").onclick = async () => {
        try {
          show("open", await api.open());
          status.textContent = "DevTools open request completed.";
        } catch (error) {
          status.textContent = "Open failed.";
          result.textContent = "open\n" + String(error);
        }
      };

      document.getElementById("probe").onclick = async () => {
        show("probe", {
          hasNamespace: !!window.__MoonBit__.devtools,
          hasOpen: typeof api.open === "function",
        });
      };
    </script>
  </body>
</html>
