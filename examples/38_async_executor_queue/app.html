<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MoonBit Async Executor Queue</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f2ea;
        color: #172026;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: stretch;
      }
      main {
        display: grid;
        grid-template-columns: minmax(260px, 340px) 1fr;
        gap: 24px;
        padding: 28px;
      }
      section {
        min-width: 0;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }
      p {
        margin: 0 0 20px;
        color: #526069;
      }
      label {
        display: block;
        margin: 16px 0 6px;
        font-size: 13px;
        font-weight: 700;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #c9c2b4;
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
        background: #fffdf9;
        color: #172026;
      }
      button {
        margin-top: 16px;
        width: 100%;
        border: 0;
        border-radius: 6px;
        padding: 11px 14px;
        background: #1e6f5c;
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover {
        background: #185a4b;
      }
      .log {
        display: grid;
        align-content: start;
        gap: 8px;
        overflow: auto;
        border-left: 1px solid #d9d1c2;
        padding-left: 24px;
      }
      .entry {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid #e5ded2;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 13px;
      }
      .kind {
        color: #8b4e20;
        font-weight: 700;
      }
      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }
        .log {
          border-left: 0;
          padding-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Async Executor Queue</h1>
        <p>JS calls enqueue work. Native returns a task id immediately, then drains a persistent queue and emits task events.</p>
        <label for="label">Task label</label>
        <input id="label" value="ai-stream-demo" />
        <label for="steps">Steps</label>
        <input id="steps" type="number" min="1" max="12" value="4" />
        <button id="start">Queue task</button>
      </section>
      <section class="log" id="log"></section>
    </main>
    <script>
      const log = document.getElementById("log");
      const addLog = (kind, text) => {
        const entry = document.createElement("div");
        entry.className = "entry";
        const kindNode = document.createElement("div");
        kindNode.className = "kind";
        kindNode.textContent = kind;
        const textNode = document.createElement("div");
        textNode.textContent = text;
        entry.append(kindNode, textNode);
        log.prepend(entry);
      };

      window.addEventListener("moonbit-task", (event) => {
        const detail = event.detail;
        const progress =
          detail.step == null ? "" : ` (${detail.step}/${detail.total})`;
        addLog(detail.kind, `#${detail.task_id} ${detail.message}${progress}`);
      });

      document.getElementById("start").addEventListener("click", async () => {
        const label = document.getElementById("label").value || "task";
        const steps = Number(document.getElementById("steps").value || "4");
        try {
          const reply = await window.moonbitStartTask({ label, steps });
          addLog("accepted", `#${reply.task_id} accepted by native queue`);
        } catch (error) {
          addLog("error", String(error));
        }
      });

      addLog("ready", "queue example loaded");
    </script>
  </body>
</html>
