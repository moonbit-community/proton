<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MoonBit Async Add Extension</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 420px;
        display: grid;
        gap: 16px;
      }

      h1 {
        margin: 0;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      label {
        font-size: 14px;
      }

      input {
        width: 100%;
        padding: 8px;
      }

      button {
        width: fit-content;
        padding: 8px 14px;
      }

      button:disabled {
        opacity: 0.68;
      }

      #status {
        font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Async Add</h1>
      <div class="field">
        <label for="left">Left</label>
        <input id="left" type="number" value="2" />
      </div>
      <div class="field">
        <label for="right">Right</label>
        <input id="right" type="number" value="3" />
      </div>
      <button id="run">Run slow add</button>
      <output id="status">Ready</output>
    </main>

    <script>
      const left = document.getElementById("left");
      const right = document.getElementById("right");
      const run = document.getElementById("run");
      const status = document.getElementById("status");

      run.addEventListener("click", async () => {
        const payload = {
          left: Number(left.value || "0"),
          right: Number(right.value || "0"),
        };

        run.disabled = true;
        status.textContent = "Waiting for MoonBit...";

        try {
          const total = await window.__MoonBit__.add.slowAdd(payload);
          status.textContent = `${payload.left} + ${payload.right} = ${total}`;
        } catch (error) {
          status.textContent = String(error);
        } finally {
          run.disabled = false;
        }
      });
    </script>
  </body>
</html>
