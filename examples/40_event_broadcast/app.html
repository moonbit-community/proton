<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MoonBit Event Broadcast</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f2efe7;
        --ink: #11181d;
        --muted: #657078;
        --line: #c7beb0;
        --panel: #fffaf1;
        --accent: #195f66;
        --accent-ink: #f2fffd;
        --pulse: #b84c33;
        --track: #ded5c6;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1317;
          --ink: #eef2ef;
          --muted: #9aa4a8;
          --line: #354148;
          --panel: #151b20;
          --accent: #79bfc1;
          --accent-ink: #071314;
          --pulse: #e88d71;
          --track: #283238;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: "Trebuchet MS", Verdana, sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 320px 1fr;
        border-top: 6px solid var(--accent);
      }

      aside {
        border-right: 1px solid var(--line);
        padding: 28px;
        display: grid;
        align-content: start;
        gap: 16px;
      }

      section {
        padding: 28px;
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 18px;
        min-width: 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      label,
      .label {
        display: block;
        color: var(--muted);
        font: 12px "Cascadia Mono", Consolas, monospace;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        margin-top: 7px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 11px 12px;
        background: var(--panel);
        color: var(--ink);
        font: 17px "Cascadia Mono", Consolas, monospace;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: var(--accent-ink);
        font: 700 13px "Cascadia Mono", Consolas, monospace;
        text-transform: uppercase;
        cursor: pointer;
      }

      .dial {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        padding: 18px;
        display: grid;
        gap: 12px;
      }

      .readout {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        padding: 14px;
      }

      .value {
        margin-top: 8px;
        font: 34px "Cascadia Mono", Consolas, monospace;
        letter-spacing: 0;
      }

      .bar {
        height: 18px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--track);
        overflow: hidden;
      }

      .fill {
        width: 0%;
        height: 100%;
        background: var(--pulse);
        transition: width 180ms ease;
      }

      .stream {
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        padding: 14px;
        overflow: auto;
        font: 13px/1.5 "Cascadia Mono", Consolas, monospace;
      }

      .entry {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 12px;
        padding: 8px 0;
        border-bottom: 1px solid var(--track);
      }

      .kind {
        color: var(--pulse);
        font-weight: 700;
      }

      @media (max-width: 780px) {
        main {
          grid-template-columns: 1fr;
        }

        aside {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .readout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <h1>Event Broadcast</h1>
        <label>
          Count
          <input id="count" type="number" min="1" max="20" value="8" />
        </label>
        <label>
          Interval ms
          <input id="interval" type="number" min="100" max="2000" value="500" />
        </label>
        <button id="start">Start ticker</button>
      </aside>

      <section>
        <div class="readout">
          <div class="stat">
            <div class="label">Run</div>
            <div class="value" id="run">0</div>
          </div>
          <div class="stat">
            <div class="label">Tick</div>
            <div class="value" id="tick">0</div>
          </div>
          <div class="stat">
            <div class="label">Remaining</div>
            <div class="value" id="remaining">0</div>
          </div>
        </div>
        <div class="dial">
          <div class="label">Progress</div>
          <div class="bar"><div class="fill" id="fill"></div></div>
        </div>
        <div class="stream" id="stream"></div>
      </section>
    </main>

    <script>
      const countInput = document.getElementById("count");
      const intervalInput = document.getElementById("interval");
      const start = document.getElementById("start");
      const run = document.getElementById("run");
      const tick = document.getElementById("tick");
      const remaining = document.getElementById("remaining");
      const fill = document.getElementById("fill");
      const stream = document.getElementById("stream");

      let currentRun = 0;

      function addEntry(kind, text) {
        const entry = document.createElement("div");
        entry.className = "entry";
        const kindNode = document.createElement("div");
        kindNode.className = "kind";
        kindNode.textContent = kind;
        const textNode = document.createElement("div");
        textNode.textContent = text;
        entry.append(kindNode, textNode);
        stream.prepend(entry);
      }

      function applyTick(payload) {
        if (payload.run_id !== currentRun) {
          addEntry("stale", `run #${payload.run_id} tick ${payload.index}`);
          return;
        }
        tick.textContent = String(payload.index);
        remaining.textContent = String(payload.remaining);
        fill.style.width = `${Math.round((payload.index / payload.total) * 100)}%`;
        addEntry("tick", `run #${payload.run_id} ${payload.index}/${payload.total}`);
      }

      function applyDone(payload) {
        if (payload.run_id !== currentRun) {
          return;
        }
        start.disabled = false;
        addEntry("done", `run #${payload.run_id} emitted ${payload.total} ticks`);
      }

      start.addEventListener("click", () => {
        currentRun += 1;
        const payload = {
          run_id: currentRun,
          count: Number(countInput.value || "8"),
          interval_ms: Number(intervalInput.value || "500"),
        };
        run.textContent = String(currentRun);
        tick.textContent = "0";
        remaining.textContent = String(payload.count);
        fill.style.width = "0%";
        start.disabled = true;
        addEntry("start", `run #${payload.run_id}`);
        void window.__MoonBit__.ticker.start(payload)
          .then((result) => {
            addEntry("reply", `run #${result.done.run_id} completed`);
          })
          .catch((error) => {
            start.disabled = false;
            addEntry("error", String(error));
          });
      });

      window.__MoonBit__.ticker.on("tick", (event) => {
        applyTick(event.payload);
      });
      window.__MoonBit__.ticker.on("done", (event) => {
        applyDone(event.payload);
      });
      addEntry("ready", "listeners attached");
    </script>
  </body>
</html>
