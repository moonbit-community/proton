<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoonBit Multiprocess Backend</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f8f5;
        --ink: #182026;
        --muted: #5e6b74;
        --panel: #ffffff;
        --line: #d9e1dd;
        --accent: #0f766e;
        --accent-2: #9a3412;
        --ok: #13795b;
        --err: #b42318;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111817;
          --ink: #eef5f2;
          --muted: #a4b4ae;
          --panel: #17211f;
          --line: #2a3a36;
          --accent: #2dd4bf;
          --accent-2: #fb923c;
          --ok: #5ee0a8;
          --err: #ff8a80;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      main {
        width: min(920px, 100%);
        margin: 0 auto;
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 24px 0;
      }

      button {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: white;
        border-radius: 6px;
        padding: 10px 14px;
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        border-color: var(--line);
        background: var(--panel);
        color: var(--ink);
      }

      dl {
        display: grid;
        grid-template-columns: 160px 1fr;
        gap: 10px 16px;
        margin: 0 0 20px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      dt {
        color: var(--muted);
      }

      dd {
        margin: 0;
        font-weight: 600;
      }

      pre {
        min-height: 260px;
        margin: 0;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: auto;
        white-space: pre-wrap;
        line-height: 1.55;
      }

      .ok {
        color: var(--ok);
      }

      .err {
        color: var(--err);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MoonBit multiprocess backend</h1>
      <p>
        The window process owns WebView2 and JavaScript. The MBT process owns
        commands, state, and async work over MoonBit-managed IPC.
      </p>

      <div class="toolbar">
        <button id="run">Run IPC probe</button>
        <button id="fail" class="secondary">Call failing op</button>
      </div>

      <dl>
        <dt>Bridge</dt>
        <dd id="bridge">Waiting</dd>
        <dt>Backend</dt>
        <dd id="backend">Waiting</dd>
        <dt>Async timer</dt>
        <dd id="timer">Waiting</dd>
      </dl>

      <pre id="log">Ready.</pre>
    </main>

    <script>
      const bridgeEl = document.querySelector("#bridge");
      const backendEl = document.querySelector("#backend");
      const timerEl = document.querySelector("#timer");
      const logEl = document.querySelector("#log");
      const runButton = document.querySelector("#run");
      const failButton = document.querySelector("#fail");

      function log(line, kind = "") {
        const prefix = kind ? `[${kind}] ` : "";
        logEl.textContent += `\n${prefix}${line}`;
      }

      function setStatus(el, text, cls) {
        el.textContent = text;
        el.className = cls;
      }

      async function invoke(name, payload) {
        return window.__MoonBit__.core.invokeOp(name, payload);
      }

      async function runProbe() {
        logEl.textContent = "Running IPC probe...";
        setStatus(bridgeEl, "Ready", "ok");
        setStatus(backendEl, "Calling", "");
        setStatus(timerEl, "Checking", "");
        const watchdog = window.setTimeout(() => {
          void window.reportMultiprocessProbe?.({
            ok: false,
            stage: "probe-timeout",
            has_moonbit: !!window.__MoonBit__,
            has_core: !!window.__MoonBit__?.core,
            has_invoke_op: !!window.__MoonBit__?.core?.invokeOp,
          });
        }, 1800);

        let timerFiredBeforeReply = false;
        const timer = window.setTimeout(() => {
          timerFiredBeforeReply = true;
          setStatus(timerEl, "UI stayed responsive", "ok");
        }, 80);

        try {
          const ping = await invoke("app:ping", { name: "webview" });
          log(`ping -> ${JSON.stringify(ping)}`);

          const sum = await invoke("app:slowAdd", {
            left: 20,
            right: 22,
            delay_ms: 350,
          });
          window.clearTimeout(timer);
          window.clearTimeout(watchdog);
          log(`slowAdd -> ${JSON.stringify(sum)}`);

          setStatus(backendEl, `${sum.total} from ${sum.process}`, "ok");
          if (!timerFiredBeforeReply) {
            setStatus(timerEl, "Timer fired after reply", "err");
          }

          void window.reportMultiprocessProbe?.({
            ok: true,
            ping,
            sum,
            timer_fired_before_reply: timerFiredBeforeReply,
          });
        } catch (error) {
          window.clearTimeout(timer);
          window.clearTimeout(watchdog);
          setStatus(backendEl, "Failed", "err");
          log(String(error), "error");
          void window.reportMultiprocessProbe?.({
            ok: false,
            error: String(error),
          });
        }
      }

      async function callFailure() {
        try {
          await invoke("app:fail", { message: "Failure crossed process IPC" });
          log("Expected app:fail to reject", "error");
        } catch (error) {
          log(`app:fail rejected as expected -> ${String(error)}`, "ok");
        }
      }

      function waitForBridge(attempt = 0) {
        if (window.__MoonBit__?.core?.invokeOp) {
          setStatus(bridgeEl, "Ready", "ok");
          void runProbe();
          return;
        }
        if (attempt > 80) {
          setStatus(bridgeEl, "Timed out", "err");
          void window.reportMultiprocessProbe?.({
            ok: false,
            stage: "bridge-timeout",
            has_moonbit: !!window.__MoonBit__,
            has_core: !!window.__MoonBit__?.core,
            has_invoke_op: !!window.__MoonBit__?.core?.invokeOp,
          });
          return;
        }
        window.setTimeout(() => waitForBridge(attempt + 1), 25);
      }

      runButton.addEventListener("click", () => void runProbe());
      failButton.addEventListener("click", () => void callFailure());
      window.addEventListener("load", () => {
        waitForBridge();
      });
    </script>
  </body>
</html>
